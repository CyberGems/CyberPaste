name: "Release"
on:
  push:
    tags:
      - 'v*'

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        settings:
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            args: ""
          - platform: windows-latest
            target: aarch64-pc-windows-msvc
            args: "--target aarch64-pc-windows-msvc"

    runs-on: ${{ matrix.settings.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.settings.target }}

      - name: Cache Rust Dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: 'src-tauri -> target'

      - name: install dependencies
        run: npm install

      - name: Conditionally Disable Updater
        env:
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
        run: |
          if ([string]::IsNullOrEmpty($env:TAURI_PRIVATE_KEY)) {
            Write-Host "TAURI_PRIVATE_KEY is not set. Disabling updater config in tauri.conf.json..."
            node -e "const fs = require('fs'); const config = JSON.parse(fs.readFileSync('src-tauri/tauri.conf.json')); if (config.plugins && config.plugins.updater) { config.plugins.updater.active = false; } delete config.bundle.createUpdaterArtifacts; fs.writeFileSync('src-tauri/tauri.conf.json', JSON.stringify(config, null, 2));"
          } else {
            Write-Host "TAURI_PRIVATE_KEY is set. Keeping updater enabled."
          }
          if (Test-Path pnpm-lock.yaml) { Remove-Item pnpm-lock.yaml }

      - name: Extract Release Notes
        id: extract_notes
        run: |
          node -e "
            const fs = require('fs');
            const content = fs.readFileSync('CHANGELOG.md', 'utf8');
            const version = process.env.GITHUB_REF_NAME.replace(/\\./g, '\\\\.');
            const regex = new RegExp('^## ' + version + '\\\\r?\\\\n([\\\\s\\\\S]*?)(?:^## |$)', 'im');
            const match = content.match(regex);
            const notes = match ? match[1].trim() : 'Release ' + version;
            fs.writeFileSync('RELEASE_NOTES.txt', notes);
          "
          $notes = Get-Content RELEASE_NOTES.txt -Raw
          $eof = [Guid]::NewGuid().ToString()
          Add-Content -Path $env:GITHUB_OUTPUT -Value "notes<<$eof"
          Add-Content -Path $env:GITHUB_OUTPUT -Value $notes
          Add-Content -Path $env:GITHUB_OUTPUT -Value $eof

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
          # TAURI_PRIVATE_KEY and TAURI_KEY_PASSWORD are required for the updater
          # Ensure these are set in the GitHub repository secrets
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "CyberPaste ${{ github.ref_name }}"
          releaseBody: ${{ steps.extract_notes.outputs.notes }}
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.settings.args }}
